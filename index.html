<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Meu Site</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    header {
      padding: 40px;
      font-size: 2em;
      font-weight: bold;
    }

    .box {
      margin: 40px auto;
      padding: 20px;
      width: 80%;
      max-width: 500px;
      background: #334155;
      border-radius: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

<header>
  Meu Primeiro Site 🚀
</header>

<div class="box">
  <h2>Bem-vindo</h2>
  <p>Esse site foi feito usando inteligência artificial.</p>
  <button onclick="alert('Funcionando perfeitamente 😎')">
    Clique aqui
  </button>
</div>

</body>
</html>
